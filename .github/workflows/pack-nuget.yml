name: Publish Limen.Contracts

on:
  push:
    branches: [main]
    paths: ['contracts/**']

permissions:
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet pack contracts/Limen.Contracts/Limen.Contracts.csproj --configuration Release -o ./nupkg
      - run: dotnet nuget push ./nupkg/*.nupkg --source "https://nuget.pkg.github.com/getlimen/index.json" --api-key ${{ secrets.GITHUB_TOKEN }}
